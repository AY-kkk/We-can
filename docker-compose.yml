services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./wecan.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:4173
      - LLM_PROVIDER=mock
      - SEARCH_PROVIDER=mock
      - TRANSCRIBER_PROVIDER=mock
    volumes:
      - backend_data:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
