name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic pydantic-settings \
            sqlalchemy aiosqlite greenlet python-multipart pdfplumber python-docx \
            httpx PyJWT bcrypt email-validator pytest pytest-asyncio pytest-cov ruff black
      - name: Ruff
        run: ruff check app tests scripts
      - name: Black
        run: black --check app tests scripts
      - name: Pytest (coverage >= 60%)
        run: pytest --cov=app --cov-fail-under=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: ESLint
        run: npm run lint
      - name: Vitest
        run: npm test
      - name: Build
        run: npm run build
